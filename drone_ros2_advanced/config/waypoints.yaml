# ==============================================================================
# Waypoint 미션 설정 파일 (3주차~)
#
# - takeoff_altitude : 이륙 고도 [m] (양수로 입력, 코드에서 NED 변환)
# - hold_sec         : 각 waypoint에서 머무는 시간 [s] (3주차 시간 기반에서 사용)
# - tolerance        : waypoint 도달 판정 반경 [m] (4주차부터 사용)
# - waypoints        : [x, y] 목록 (NED 좌표, 단위 m)
#                      x: 북쪽(+) / 남쪽(-), y: 동쪽(+) / 서쪽(-)
#
# 여기 숫자만 바꾸면 코드 수정 없이 미션이 바뀝니다!
# ==============================================================================
takeoff_altitude: 5.0
hold_sec: 5.0
tolerance: 0.5

waypoints:
  - [5.0, 0.0]    # WP1: 북쪽 5m
  - [5.0, 5.0]    # WP2: 북동쪽
  - [0.0, 5.0]    # WP3: 동쪽 5m
  - [0.0, 0.0]    # WP4: 출발점 복귀
